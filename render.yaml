services:
  - type: web
    name: inventory-pro-python
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
